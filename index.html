<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message In A Bottle ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="sea-background">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
    </div>

    <main class="beach-interface">
        <header class="header-glass">
            <h1>Our Digital Ocean of Love 🌊</h1>
            <p>May mga lihim na mensaheng lumulutang sa dagat... I-click ang bote para mabasa ang isa.</p>
        </header>

        <div class="ocean-floor" id="bottle-container">
            </div>
    </main>

    <div id="scroll-modal" class="modal hidden">
        <div class="scroll-container">
            <div class="scroll-paper">
                <span class="close-btn" id="close-modal">&times;</span>
                <div class="scroll-content">
                    <i class="fas fa-heart letter-heart"></i>
                    <p id="message-text">Loading your love note...</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>Made with ❤️ just for you.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
